name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Dependency audit (high and critical)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  database:
    name: Clean database migration test
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Start disposable Supabase
        run: supabase start

      - name: Apply migrations and seed from zero
        run: supabase db reset

      - name: Stop disposable Supabase
        if: always()
        run: supabase stop --no-backup

  deploy:
    name: Apply database migrations
    needs: database
    runs-on: ubuntu-latest
    environment: Production

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Link and Push to Supabase
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push --yes
