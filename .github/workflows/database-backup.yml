name: Encrypted Database Backup

on:
  schedule:
    - cron: '20 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database-backup
  cancel-in-progress: false

jobs:
  backup-and-restore-drill:
    name: Backup and restore drill
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Link production database
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Create encrypted database and Storage backup
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          GARCA_BACKUP_OUTPUT_DIR: ${{ runner.temp }}/encrypted-backup
          GARCA_BACKUP_STAGING_DIR: ${{ runner.temp }}/backup-staging
          GARCA_KEEP_BACKUP_STAGING: '1'
        run: bash scripts/database-backup.sh

      - name: Restore every row into a disposable database
        env:
          GARCA_ALLOW_LOCAL_RESET: '1'
        run: bash scripts/database-restore-drill.sh "${{ runner.temp }}/backup-staging/payload"

      - name: Mark restore drill as verified
        run: |
          manifest="$(find "${{ runner.temp }}/encrypted-backup" -name manifest-public.json -print -quit)"
          jq '.restore_drill = true' "$manifest" > "$manifest.tmp"
          mv "$manifest.tmp" "$manifest"

      - name: Publish encrypted copy with 90-day retention
        uses: actions/upload-artifact@v4
        with:
          name: garca-branca-backup-${{ github.run_id }}
          path: ${{ runner.temp }}/encrypted-backup/**
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Register immutable backup evidence
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
        run: |
          manifest="$(find "${{ runner.temp }}/encrypted-backup" -name manifest-public.json -print -quit)"
          npx tsx scripts/report-backup.ts "$manifest"

      - name: Remove plaintext working copy
        if: always()
        run: rm -rf "${{ runner.temp }}/backup-staging"
